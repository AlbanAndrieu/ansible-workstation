---
# ansible-playbook -i hosts -c local workstation.yml -vvv --ask-become-pass --become | tee setup.log

- name: Assert platform is supported
  hosts: all
  remote_user: root
  gather_facts: true

  tasks:
    - name: Assert platform is supported
      assert:
        that:
          - ansible_os_family in ['Debian', 'RedHat', 'CentOS', 'Windows', 'Solaris']
          - ansible_architecture in ['x86_64']

- hosts: all
  gather_facts: true
  tasks:
    - name: group hosts by distribution
      group_by: key="{{ ansible_distribution }}-{{ ansible_distribution_version }}"

- hosts: RedHat-7*:RedHat-6*:CentOS-7*:CentOS-6*:Ubuntu-25*:Ubuntu-24*:Ubuntu-23*:Ubuntu-22*:Ubuntu-21*:Ubuntu-20*:Ubuntu-19*:Ubuntu-18*:Ubuntu-17*:Ubuntu-16*:Ubuntu-15*:Ubuntu-14*:Ubuntu-13*:Ubuntu-12*
  gather_facts: false
  tasks:
    - name: group hosts for supported distributions
      group_by: key="supported"

- hosts: "!supported"
  gather_facts: false
  tasks:
    - name: fail for unsupported distribution
      fail: msg="{{ ansible_distribution }} {{ ansible_distribution_version }}
        is not a supported OS for a Tower installation.  Supported
        OSes include Red Hat Enterprise Linux 6/7, CentOS 6/7, or
        Ubuntu 12.04/12.04/14.04/16.04/17.04/18.04/19.04/20.04/21.04/22.04/23.04/24.04/25.04"
    - debug: msg="Version {{ ansible_distribution }} {{ ansible_distribution_version }} {{ ansible_architecture }}"

- hosts: all
  tasks:
    - name: check that i have log file for all hosts on my local machine
      stat: path=/var/log/hosts/{{inventory_hostname}}.log
      delegate_to: localhost

- name: workstation | Test configuration
  hosts: localhost
  gather_facts: true

  pre_tasks:
    - name: run_command
      # ansible.builtin.command: date
      ansible.builtin.shell: date
      delegate_to: localhost
      register: user

    - debug: msg="{{ user.stdout }}"

    - debug: msg="Hostname is {{ ansible_hostname }}"

- name: workstation | Apply basic ssh security configuration
  hosts: localhost
  become: true
  gather_facts: false

  roles:
    - geerlingguy.security

  vars:
    # sudoers_enabled: no
    security_ssh_port: 9922
    restart_ssh_enabled: false
    security_ssh_password_authentication: "no"
    security_ssh_permit_root_login: "no"
    security_ssh_usedns: "no"
    security_ssh_permit_empty_password: "no"
    security_ssh_challenge_response_auth: "no"
    security_ssh_gss_api_authentication: "no"
    security_ssh_x11_forwarding: "no"
    security_fail2ban_enabled: true
    # security_autoupdate_enabled: false # make yum to get stuck later
    security_ssh_allowed_users:
      - albandrieu
      - albanandrieu
    security_sudoers_passwordless:
      - albandrieu


- name: workstation | Test sandbox
  hosts: localhost
  gather_facts: yes
  #become: true

  tasks:
    - debug:
        var: ansible_version.full
    - debug:
        var: ansible_en.container

- name: workstation | Apply basic more advanced hardening security configuration
  hosts: localhost
  #become: true

  collections:
    - devsec.hardening

  roles:
    - devsec.hardening.os_hardening
    - devsec.hardening.ssh_hardening

  vars:
    os_desktop_enable: true
    # os_auditd_enabled: false
    # os_pam_enabled: false
    os_securetty_enabled: false
    #os_security_auto_logout: 60
    os_sysctl_enabled: false
    sysctl_overwrite:
      # Enable IPv4 traffic forwarding.
      net.ipv4.ip_forward: 1
      # Disable IPv6 traffic forwarding.
      net.ipv6.conf.all.forwarding: 0
    sysctl_custom_config:
      # Mitigation of vulnerability CVE-2021-33909
      # NOK podman images
      kernel.unprivileged_userns_clone: 1
      kernel.unprivileged_bpf_disabled: 0
    #os_security_suid_sgid_system_whitelist:
    # - '/usr/bin/ssh-agent'
    #os_security_suid_sgid_whitelist:
    #  -
    os_selinux_enabled: false
    # ssh_permit_root_login: true
    ssh_client_hardening: false
    ssh_server_hardening: false
    ssh_allow_agent_forwarding: true
    ssh_x11_forwarding: true
    ssh_pam_support: false
    ssh_client_password_login: true
    ssh_banner: true


- name: workstation | Apply configuration
  hosts: localhost # , albandrieu, workstation
  become: true
  # remote_user: albandrieu
  gather_facts: false

  # tasks:
  #   - name: Call the 'common' role to do some general setup
  #     import_tasks: ./tasks/main.yml
  #     delegate_to: localhost

  tasks:
    - name: Run tasks/debug.yml instead of 'main'
      ansible.builtin.include_role:
        name: albanandrieu.workstation
        
        # Disable nbelow tasks_from to run everythings
        # tasks_from: services

      vars:
        dash_enabled: false
        webapps_enabled: false
        apache_create_vhosts: false

