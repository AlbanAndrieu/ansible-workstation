---
# System tuning: grub, preload, ureadahead, perl-doc, galternatives, multisystem.

- name: system_tuning | Add Grub Customizer PPA
  ansible.builtin.apt_repository:
    repo: "ppa:danielrichter2007/grub-customizer"
    state: "{{ util_repository_state | default('present') }}"
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version in ['18.04', '18.10'] and grub_customizer_enabled
  tags: grub_customizer

- name: system_tuning | Install Grub Customizer
  ansible.builtin.apt:
    name: grub-customizer
    state: "{{ util_pkg_state | default('present') }}"
    update_cache: true
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version not in ['18.04', '18.10'] and grub_customizer_enabled
  tags: grub_customizer

- name: system_tuning | Install preload
  ansible.builtin.apt:
    name: preload
    state: "{{ util_pkg_state | default('present') }}"
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version not in ['12.04', '14.04']
  tags: package

- name: system_tuning | Install ureadahead
  ansible.builtin.apt:
    name: ureadahead
    state: "{{ util_pkg_state | default('present') }}"
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version not in ['19.04', '19.10']
  tags: package

- name: system_tuning | Install perl-doc
  ansible.builtin.apt:
    name: perl-doc
    state: "{{ util_pkg_state | default('present') }}"
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version not in ['12.04', '14.04']
  tags: package

- name: system_tuning | Install galternatives
  ansible.builtin.apt:
    name: galternatives
    state: "{{ util_pkg_state | default('present') }}"
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version not in ['12.04', '14.04']
  tags: package

- name: system_tuning | Add multisystem repository
  ansible.builtin.apt_repository:
    repo: "deb http://liveusb.info/multisystem/depot all main"
    state: present
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version in ['14.04', '16.04']
  tags: multisystem

- name: system_tuning | Add multisystem repository key
  ansible.builtin.apt_key:
    url: http://liveusb.info/multisystem/depot/multisystem.asc
    state: "{{ util_pkg_state | default('present') }}"
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version in ['14.04', '16.04']
  tags: multisystem

- name: system_tuning | Install multisystem
  ansible.builtin.apt:
    name: multisystem
    state: "{{ util_pkg_state | default('present') }}"
    update_cache: true
  become: true
  when: ansible_os_family == 'Debian' and ansible_distribution_version in ['12.04', '18.04']
  tags: multisystem
