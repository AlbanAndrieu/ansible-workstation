# sudo systemctl disable apport
- name: workstation | Disable apport
  systemd:
    name: apport
    state: stopped
    enabled: false
  when: (ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu')
  changed_when: false
  become: true
  ignore_errors: true

- name: workstation | Install unattended upgrade
  become: true
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
  tags:
    - package
    - unattended-upgrades
    - vm

- name: workstation | Enable unattended upgrade
  command: dpkg-reconfigure --priority=low unattended-upgrades
  become: true
  when: (ansible_distribution == 'Debian' or ansible_distribution == 'Ubuntu') and ansible_distribution_version is version('19.04', '>=')
  tags:
    - package
    - unattended-upgrades
    - vm

- name: workstation | Configure automatic security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
  tags:
    - unattended-upgrades
    - vm

# https://github.com/openclaw/openclaw-ansible/blob/main/roles/openclaw/tasks/firewall-linux.yml

- name: workstation | Configure unattended-upgrades to only install security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      // OpenClaw security hardening - automatic security updates
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Package-Blacklist {
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";
  tags:
    - unattended-upgrades
    - vm

